<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Perfect Day</title>
<meta name="theme-color" content="#1D9E75" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Perfect Day" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<style>
  :root {
    --bg: #F1EFE8; --card: #FFFFFF; --border: #D3D1C7;
    --text: #2C2C2A; --text-secondary: #5F5E5A; --text-muted: #888780;
    --green-bg: #EAF3DE; --green-text: #173404; --accent: #0F6E56;
    --amber-bg: #FAEEDA; --amber-text: #633806;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a19; --card: #2C2C2A; --border: #444441;
      --text: #F1EFE8; --text-secondary: #B4B2A9; --text-muted: #888780;
      --green-bg: #173404; --green-text: #C0DD97; --accent: #5DCAA5;
      --amber-bg: #412402; --amber-text: #FAC775;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 24px);
    min-height: 100vh;
  }
  .header { padding: 20px 4px 8px; display: flex; justify-content: space-between; align-items: flex-start; }
  .phase-name { font-size: 20px; font-weight: 600; }
  .phase-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .icon-btn {
    background: var(--card); border: 0.5px solid var(--border); border-radius: 10px;
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--text-secondary); cursor: pointer;
  }
  .header-btns { display: flex; gap: 8px; }
  .day-nav { display: flex; align-items: center; justify-content: space-between; margin: 8px 4px 4px; }
  .day-nav-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  .day-nav button {
    background: none; border: none; font-size: 20px; color: var(--text-secondary);
    padding: 4px 10px; cursor: pointer;
  }
  .day-nav button:disabled { opacity: 0.3; }
  .stats { display: flex; gap: 12px; margin: 16px 0; }
  .stat-card {
    flex: 1; background: var(--card); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 14px; text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 600; }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .items { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 14px; cursor: pointer;
    transition: background 0.15s;
  }
  .item.done { background: var(--green-bg); }
  .item.done .item-label { color: var(--green-text); }
  .item-body { flex: 1; min-width: 0; }
  .item-note {
    font-size: 12px; color: var(--text-muted); margin-top: 4px;
    padding: 2px 0; cursor: pointer;
  }
  .item.done .item-note { color: var(--green-text); opacity: 0.75; }
  .checkbox {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: white;
  }
  .item.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .item-label { font-size: 15px; }
  .footer-note {
    margin-top: 20px; font-size: 12px; color: var(--text-muted);
    text-align: center; padding: 0 20px;
  }
  .freeze-row {
    margin-top: 10px; font-size: 12px; color: var(--text-muted);
    text-align: center; padding: 0 10px;
  }
  .phase-banner {
    margin-top: 12px; padding: 12px 14px; border-radius: 10px;
    background: var(--green-bg); color: var(--green-text);
    font-size: 13px; text-align: center; font-weight: 500;
  }
  .hard-day-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 0.5px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin: 12px 0;
  }
  .hard-day-row.active { background: var(--amber-bg); }
  .hard-day-label { font-size: 13px; }
  .hard-day-row.active .hard-day-label { color: var(--amber-text); font-weight: 500; }
  .toggle {
    width: 44px; height: 26px; border-radius: 13px; background: var(--border);
    position: relative; cursor: pointer; flex-shrink: 0; transition: background 0.15s;
  }
  .toggle.on { background: var(--accent); }
  .toggle-knob {
    width: 22px; height: 22px; border-radius: 50%; background: white;
    position: absolute; top: 2px; left: 2px; transition: left 0.15s;
  }
  .toggle.on .toggle-knob { left: 20px; }
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .sheet {
    background: var(--bg); width: 100%; max-width: 480px; border-radius: 16px 16px 0 0;
    padding: 20px 16px calc(env(safe-area-inset-bottom) + 20px); max-height: 85vh; overflow-y: auto;
  }
  .sheet-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .sheet-close {
    text-align: center; padding: 12px; color: var(--text-secondary); font-size: 14px; cursor: pointer;
  }
  .history-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 4px; border-bottom: 0.5px solid var(--border); font-size: 14px;
  }
  .history-dot { width: 10px; height: 10px; border-radius: 50%; }
  .history-dot.clean { background: var(--accent); }
  .history-dot.partial { background: #EF9F27; }
  .history-dot.none { background: var(--border); }
  .history-dot.frozen { background: #4FA8E8; }
  .trend-chart {
    display: flex; align-items: flex-end; gap: 3px;
    height: 90px; margin-top: 16px; padding: 0 2px;
  }
  .trend-bar { flex: 1; border-radius: 2px 2px 0 0; min-width: 2px; }
  .trend-bar.clean { background: var(--accent); }
  .trend-bar.partial { background: #EF9F27; }
  .trend-bar.none { background: var(--border); }
  .trend-bar.frozen { background: #4FA8E8; }
  .trend-legend {
    display: flex; gap: 16px; margin-top: 8px;
    font-size: 12px; color: var(--text-muted);
  }
  .trend-legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .legend-dot.clean { background: var(--accent); }
  .legend-dot.partial { background: #EF9F27; }
  .legend-dot.none { background: var(--border); }
  .legend-dot.frozen { background: #4FA8E8; }
  .action-btn {
    display: block; width: 100%; text-align: center; padding: 12px;
    background: var(--card); border: 0.5px solid var(--border); border-radius: 10px;
    font-size: 14px; margin-top: 10px; cursor: pointer; color: var(--text);
  }
  .action-btn.danger { color: #E24B4A; }
  textarea.import-box {
    width: 100%; min-height: 80px; margin-top: 8px; border-radius: 8px;
    border: 0.5px solid var(--border); background: var(--card); color: var(--text);
    font-size: 12px; padding: 8px; font-family: monospace;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ---- Config: this array is the only thing you'd change to re-calibrate the plan ----
const PHASES = [
  { name: "Phase 1", items: [
    { id: "wake", label: "5:45am wake, feet on floor", essential: true },
    { id: "water", label: "Water, cold face, prayer" },
    { id: "gym", label: "6am gym or stretch (light effort)" },
    { id: "study", label: "9am desk, 90 min minimum", essential: true },
    { id: "meals", label: "3 meals: 8am / 1pm / 5pm", essential: true },
  ]},
  { name: "Phase 2", items: [
    { id: "wake", label: "5:45am wake, feet on floor", essential: true },
    { id: "water", label: "Water, cold face, prayer" },
    { id: "gym", label: "Gym, full intensity" },
    { id: "study", label: "Study block (building to 6hrs)", essential: true },
    { id: "meals", label: "3 meals: 8am / 1pm / 5pm", essential: true },
    { id: "journal", label: "Journal (after prayer)" },
  ]},
  { name: "Phase 3", items: [
    { id: "wake", label: "5:45am wake, feet on floor", essential: true },
    { id: "water", label: "Water, cold face, prayer" },
    { id: "gym", label: "Gym, full intensity" },
    { id: "study", label: "Study block, 6hrs", essential: true },
    { id: "meals", label: "Meals: 3000kcal / 170g protein", essential: true },
    { id: "journal", label: "Journal" },
    { id: "tennis", label: "Tennis (after study ends)" },
  ]},
  { name: "Phase 4", items: [
    { id: "wake", label: "5:45am wake, feet on floor", essential: true },
    { id: "water", label: "Water, cold face, prayer" },
    { id: "gym", label: "Gym, full intensity" },
    { id: "study", label: "Study block, 6hrs", essential: true },
    { id: "meals", label: "Meals: 3000kcal / 170g protein", essential: true },
    { id: "journal", label: "Journal" },
    { id: "tennis", label: "Tennis" },
    { id: "language", label: "Language block, 4-5pm" },
    { id: "reading", label: "Reading / random topic" },
  ]},
];
// Hard-day mode: keeps only items tagged essential:true — the floor YOU chose
// (wake, study, meals), not just whichever items happened to be listed first.
const CLEAN_DAYS_TO_ADVANCE = 5;
const STORAGE_KEY = "perfect-day-state-v2";
// --------------------------------------------------------------------------------

function fmtKey(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function todayKey() { return fmtKey(new Date()); }

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { phase: 0, logs: {}, justAdvanced: false, bestStreak: 0, freezes: 0, freezeDays: {}, freezeAwardTier: 0 };
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let state = loadState();
let viewOffset = 0; // 0 = today, -1 = yesterday, etc. Only 0 and -1 editable.
let sheetOpen = null; // null | "history" | "backup"

function viewDate() {
  const d = new Date();
  d.setDate(d.getDate() + viewOffset);
  return d;
}
function viewKey() { return fmtKey(viewDate()); }

function activeItems(phaseIdx, hardDay) {
  const items = PHASES[phaseIdx].items;
  return hardDay ? items.filter(i => i.essential) : items;
}

function dayIsClean(key, phaseIdx) {
  const log = state.logs[key];
  if (!log) return false;
  const items = activeItems(phaseIdx, log.hardDay);
  return items.length > 0 && items.every(i => log[i.id]);
}

function streakAndBest() {
  let count = 0;
  let d = new Date();
  state.freezeDays = state.freezeDays || {};
  let freezesRemaining = state.freezes || 0;
  let freezesChanged = false;
  while (true) {
    const key = fmtKey(d);
    if (dayIsClean(key, state.phase)) {
      count++;
    } else if (state.freezeDays[key]) {
      // a day already protected by a freeze in an earlier calculation
      count++;
    } else if (!state.logs[key] && freezesRemaining > 0 && key !== todayKey()) {
      // a fully missed past day (no log at all), covered by an earned freeze —
      // today is never freeze-eligible while the day is still in progress
      state.freezeDays[key] = true;
      freezesRemaining--;
      freezesChanged = true;
      count++;
    } else {
      break;
    }
    d.setDate(d.getDate() - 1);
  }
  if (freezesChanged) state.freezes = freezesRemaining;
  if (count > (state.bestStreak || 0)) state.bestStreak = count;
  return count;
}

function maybeAwardFreeze(streak) {
  const MILESTONE = 7;   // days of clean streak per freeze earned
  const MAX_FREEZES = 2; // "just enough, not too many"
  const tierReached = Math.floor(streak / MILESTONE);
  const tierAlreadyAwarded = state.freezeAwardTier || 0;
  state.justEarnedFreeze = false;
  if (tierReached > tierAlreadyAwarded) {
    const gained = tierReached - tierAlreadyAwarded;
    state.freezes = Math.min(MAX_FREEZES, (state.freezes || 0) + gained);
    state.freezeAwardTier = tierReached;
    state.justEarnedFreeze = true;
  }
}

function toggle(id) {
  const key = viewKey();
  if (!state.logs[key]) state.logs[key] = {};
  state.logs[key][id] = !state.logs[key][id];
  state.justAdvanced = false;
  if (viewOffset === 0) {
    const s = streakAndBest();
    if (s >= CLEAN_DAYS_TO_ADVANCE && state.phase < PHASES.length - 1) {
      state.phase += 1;
      state.justAdvanced = true;
    }
    maybeAwardFreeze(s);
  } else {
    streakAndBest();
  }
  saveState(state);
  render();
}

function setNote(id) {
  const key = viewKey();
  if (!state.logs[key] || !state.logs[key][id]) return; // only note completed items
  const existing = state.logs[key][id + "__note"] || "";
  const text = prompt("Quick note (optional) — how did it go?", existing);
  if (text === null) return; // cancelled, nothing changes
  if (text.trim() === "") {
    delete state.logs[key][id + "__note"];
  } else {
    state.logs[key][id + "__note"] = text.trim();
  }
  saveState(state);
  render();
}

function toggleHardDay() {
  const key = viewKey();
  if (!state.logs[key]) state.logs[key] = {};
  state.logs[key].hardDay = !state.logs[key].hardDay;
  saveState(state);
  render();
}

function navDay(delta) {
  const next = viewOffset + delta;
  if (next > 0 || next < -1) return; // only today and yesterday editable/viewable this way
  viewOffset = next;
  render();
}

function exportData() {
  const blob = JSON.stringify(state);
  const ta = document.createElement("textarea");
  ta.value = blob;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
  alert("Backup copied to clipboard. Paste it somewhere safe (Notes app works).");
}

function importData(raw) {
  try {
    const parsed = JSON.parse(raw);
    if (typeof parsed.phase !== "number" || typeof parsed.logs !== "object") throw new Error("bad shape");
    state = parsed;
    saveState(state);
    sheetOpen = null;
    render();
    alert("Restored.");
  } catch (e) {
    alert("That didn't look like a valid backup. Nothing changed.");
  }
}

function dayLabel() {
  if (viewOffset === 0) return "Today";
  if (viewOffset === -1) return "Yesterday";
  return viewKey();
}

function render() {
  const app = document.getElementById("app");
  const phase = PHASES[state.phase];
  const key = viewKey();
  const log = state.logs[key] || {};
  const hardDay = !!log.hardDay;
  const items = activeItems(state.phase, hardDay);
  const s = streakAndBest();
  const doneCount = items.filter(i => log[i.id]).length;

  let html = `
    <div class="header">
      <div>
        <div class="phase-name">${phase.name}</div>
        <div class="phase-sub">${items.length} anchors${hardDay ? " (hard-day mode)" : ""}</div>
      </div>
      <div class="header-btns">
        <div class="icon-btn" id="btn-history">&#128202;</div>
        <div class="icon-btn" id="btn-backup">&#8635;</div>
      </div>
    </div>

    <div class="day-nav">
      <button id="nav-prev" ${viewOffset <= -1 ? "disabled" : ""}>&#8249;</button>
      <div class="day-nav-label">${dayLabel()}</div>
      <button id="nav-next" ${viewOffset >= 0 ? "disabled" : ""}>&#8250;</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-num">${doneCount}/${items.length}</div>
        <div class="stat-label">${dayLabel().toLowerCase()}</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${s}</div>
        <div class="stat-label">day streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${state.bestStreak || 0}</div>
        <div class="stat-label">best streak</div>
      </div>
    </div>

    <div class="freeze-row">&#10052;&#65039; ${state.freezes || 0} freeze${(state.freezes || 0) === 1 ? "" : "s"} banked — earned every 7-day clean streak, covers a fully missed day, max 2</div>

    ${state.justEarnedFreeze && viewOffset === 0 ? `<div class="phase-banner">&#10052;&#65039; Freeze earned — your streak is now protected for one fully missed day</div>` : ""}
    ${state.justAdvanced && viewOffset === 0 ? `<div class="phase-banner">${CLEAN_DAYS_TO_ADVANCE} clean days — moved up to ${phase.name}</div>` : ""}

    <div class="hard-day-row ${hardDay ? "active" : ""}">
      <div class="hard-day-label">Hard-day mode — reduced anchors, no lying on the boxes</div>
      <div class="toggle ${hardDay ? "on" : ""}" id="toggle-hardday"><div class="toggle-knob"></div></div>
    </div>

    <div class="items">
      ${items.map(i => `
        <div class="item ${log[i.id] ? "done" : ""}" data-id="${i.id}">
          <div class="checkbox">${log[i.id] ? "&#10003;" : ""}</div>
          <div class="item-body">
            <div class="item-label">${i.label}</div>
            ${log[i.id] ? `<div class="item-note" data-note-id="${i.id}">${log[i.id + "__note"] ? "&#128221; " + log[i.id + "__note"] : "+ add note"}</div>` : ""}
          </div>
        </div>
      `).join("")}
    </div>
    <div class="footer-note">${CLEAN_DAYS_TO_ADVANCE} clean days in a row auto-advances the phase. Partial days don't count. Only today and yesterday are editable.</div>
  `;

  if (sheetOpen === "history") {
    const rows = [];
    const dayData = [];
    let d = new Date();
    for (let i = 0; i < 30; i++) {
      const k = fmtKey(d);
      const l = state.logs[k];
      let cls = "none", label = "no data", ratio = 0;
      if (l) {
        const its = activeItems(state.phase, l.hardDay);
        const done = its.filter(x => l[x.id]).length;
        ratio = its.length > 0 ? done / its.length : 0;
        if (done === its.length && its.length > 0) { cls = "clean"; label = l.hardDay ? "clean (hard day)" : "clean"; }
        else if (done > 0) { cls = "partial"; label = `${done}/${its.length}`; }
        else { label = "0 done"; }
      } else if (state.freezeDays && state.freezeDays[k]) {
        cls = "frozen"; label = "protected by freeze"; ratio = 0.5;
      }
      dayData.push({ k, cls, label, ratio });
      rows.push(`<div class="history-row"><span>${k}</span><span style="display:flex;align-items:center;gap:8px;"><span style="color:var(--text-muted);font-size:12px;">${label}</span><span class="history-dot ${cls}"></span></span></div>`);
      d.setDate(d.getDate() - 1);
    }
    // chart reads oldest -> newest, left to right, so it shows growth over time
    const chartDays = [...dayData].reverse();
    const bars = chartDays.map(day => `
      <div class="trend-bar ${day.cls}" style="height:${Math.max(6, Math.round(day.ratio * 100))}%" title="${day.k}: ${day.label}"></div>
    `).join("");
    html += `
      <div class="overlay" id="overlay">
        <div class="sheet">
          <div class="sheet-title">Last 30 days</div>
          <div class="trend-chart">${bars}</div>
          <div class="trend-legend">
            <span><span class="legend-dot clean"></span>clean</span>
            <span><span class="legend-dot partial"></span>partial</span>
            <span><span class="legend-dot frozen"></span>frozen</span>
            <span><span class="legend-dot none"></span>no data</span>
          </div>
          <div style="margin-top:16px;">${rows.join("")}</div>
          <div class="sheet-close" id="sheet-close">Close</div>
        </div>
      </div>
    `;
  }

  if (sheetOpen === "backup") {
    html += `
      <div class="overlay" id="overlay">
        <div class="sheet">
          <div class="sheet-title">Backup and restore</div>
          <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">
            Your data lives only on this phone. Export a copy somewhere safe (Notes, email to yourself) in case you switch phones or clear Safari's storage.
          </div>
          <div class="action-btn" id="btn-export">Copy backup to clipboard</div>
          <div style="font-size:13px;color:var(--text-secondary);margin-top:16px;">Paste a backup below to restore:</div>
          <textarea class="import-box" id="import-box" placeholder="Paste backup JSON here"></textarea>
          <div class="action-btn" id="btn-import">Restore from pasted backup</div>
          <div class="action-btn danger" id="btn-reset">Reset all data (careful)</div>
          <div class="sheet-close" id="sheet-close">Close</div>
        </div>
      </div>
    `;
  }

  app.innerHTML = html;

  app.querySelectorAll(".item").forEach(el => el.addEventListener("click", () => toggle(el.dataset.id)));
  app.querySelectorAll(".item-note").forEach(el => el.addEventListener("click", (e) => {
    e.stopPropagation(); // so tapping the note doesn't also un-check the item above it
    setNote(el.dataset.noteId);
  }));
  const th = document.getElementById("toggle-hardday");
  if (th) th.addEventListener("click", toggleHardDay);
  document.getElementById("btn-history").addEventListener("click", () => { sheetOpen = "history"; render(); });
  document.getElementById("btn-backup").addEventListener("click", () => { sheetOpen = "backup"; render(); });
  const prev = document.getElementById("nav-prev");
  const next = document.getElementById("nav-next");
  if (prev) prev.addEventListener("click", () => navDay(-1));
  if (next) next.addEventListener("click", () => navDay(1));
  const overlay = document.getElementById("overlay");
  if (overlay) overlay.addEventListener("click", (e) => { if (e.target.id === "overlay") { sheetOpen = null; render(); } });
  const sc = document.getElementById("sheet-close");
  if (sc) sc.addEventListener("click", () => { sheetOpen = null; render(); });
  const be = document.getElementById("btn-export");
  if (be) be.addEventListener("click", exportData);
  const bi = document.getElementById("btn-import");
  if (bi) bi.addEventListener("click", () => {
    const val = document.getElementById("import-box").value.trim();
    if (val) importData(val);
  });
  const br = document.getElementById("btn-reset");
  if (br) br.addEventListener("click", () => {
    if (confirm("This deletes all logged days and resets to Phase 1. This cannot be undone unless you have a backup. Continue?")) {
      state = { phase: 0, logs: {}, justAdvanced: false, bestStreak: 0 };
      saveState(state);
      sheetOpen = null;
      render();
    }
  });
}

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
